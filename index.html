<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Programado II</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body onload="mostrarMensajeCookies()">

    <br><br><br>
    <center>
        <h3>
            I Examen
            <small class="text-body-secondary">Cálculo del IMC</small>
        </h3>
    </center>
    
     <br><br>
    <div class="container text-center">
        <div class="row">
          <div class="col-sm">
            
          </div>
          <div class="col-sm">

            <div class="input-group input-group-lg">
                <span class="input-group-text" id="inputGroup-sizing-lg">Peso (kilogramos) </span>
                <input id="peso" type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg">
            </div>
            <div class="input-group input-group-lg">
                <span class="input-group-text" id="inputGroup-sizing-lg">Estatura (metros)</span>
                <input id="estatura" type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg">
            </div>

            <button class="btn btn-primary" type="button" id="btnCalcular" onclick="calcularIMC()">*** Calcular el índice de masa corporal ***</button>
            
            <div class="input-group input-group-lg">
                <span class="input-group-text" id="inputGroup-sizing-lg">IMC</span>
                <input id="imc" disabled type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg">
            </div>
            <div class="input-group input-group-lg">
                <span class="input-group-text" id="inputGroup-sizing-lg">Nivel de Peso</span>
                <input id="nivelPeso" disabled type="text" class="form-control" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-lg">
            </div>

            <button class="btn btn-primary" type="button" id="btnReiniciar" onclick="reiniciarFormulario()">***** Reiniciar *****</button>

          </div>
          <div class="col-sm">
            
          </div>
        </div>
      </div>
      <br><br>
    <center>
        <h3>
            Recuerda
            <small class="text-body-secondary">Cuidar tu salud</small>
        </h3>
    </center>
    

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
